<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --border: #1e1e2e;
        --accent: #7c6af7;
        --accent-dim: #4a3fa0;
        --accent-glow: rgba(124, 106, 247, 0.15);
        --text: #e2e0f0;
        --text-dim: #6b6880;
        --text-muted: #3d3a52;
        --user-bg: #1a1728;
        --bot-bg: #12121c;
        --green: #4ade80;
        --red: #f87171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--text-muted) 1px, transparent 1px),
          linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.07;
        pointer-events: none;
        z-index: 0;
      }

      /* ---------- Sidebar (documents) ---------- */
      #sidebar {
        position: relative;
        z-index: 10;
        width: 260px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: rgba(10, 10, 15, 0.9);
        display: flex;
        flex-direction: column;
        padding: 16px;
        overflow-y: auto;
      }
      #sidebar h3 {
        font-family: "Syne", sans-serif;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        margin-bottom: 10px;
      }
      .dropzone {
        border: 1.5px dashed var(--border);
        border-radius: 8px;
        padding: 18px 10px;
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
        margin-bottom: 14px;
      }
      .dropzone:hover,
      .dropzone.dragover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .dropzone input {
        display: none;
      }
      .doc-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 11px;
      }
      .doc-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .doc-meta {
        color: var(--text-muted);
        font-size: 10px;
      }
      .doc-remove {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 13px;
        padding: 2px 4px;
        flex-shrink: 0;
      }
      .doc-remove:hover {
        color: var(--red);
      }
      .doc-empty {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        padding: 10px 0;
      }
      .upload-status {
        font-size: 10px;
        color: var(--text-dim);
        margin-bottom: 10px;
        min-height: 14px;
      }

      /* ---------- Main column ---------- */
      #main {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      header {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 10, 15, 0.9);
        backdrop-filter: blur(12px);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 14px;
        color: white;
        box-shadow: 0 0 16px rgba(124, 106, 247, 0.5);
      }

      .logo-text {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 0.02em;
      }
      .logo-text span {
        color: var(--accent);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-dim);
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .model-tag {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.05em;
      }

      .user-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-dim);
      }
      .user-chip .dot {
        color: var(--accent);
      }
      #logout-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: all 0.15s;
      }
      #logout-btn:hover {
        border-color: var(--red);
        color: var(--red);
      }

      #chat-container {
        position: relative;
        z-index: 1;
        flex: 1;
        overflow-y: auto;
        padding: 24px 0;
        scroll-behavior: smooth;
      }

      #chat-container::-webkit-scrollbar {
        width: 4px;
      }
      #chat-container::-webkit-scrollbar-track {
        background: transparent;
      }
      #chat-container::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      #messages {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 16px;
        color: var(--text-muted);
        padding: 60px 20px;
        text-align: center;
      }

      .empty-icon {
        font-size: 48px;
        opacity: 0.3;
      }

      .empty-state h2 {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--text-dim);
      }

      .empty-state p {
        font-size: 12px;
        line-height: 1.7;
        max-width: 320px;
        color: var(--text-muted);
      }

      .msg-row {
        display: flex;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        animation: fadeIn 0.2s ease;
        transition: background 0.15s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .msg-row.user {
        background: var(--user-bg);
        border: 1px solid rgba(124, 106, 247, 0.12);
      }
      .msg-row.bot {
        background: transparent;
      }

      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .avatar.user {
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid var(--accent-dim);
      }
      .avatar.bot {
        background: var(--surface);
        color: var(--text-dim);
        border: 1px solid var(--border);
      }

      .msg-content {
        flex: 1;
        min-width: 0;
      }

      .msg-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 5px;
        color: var(--text-muted);
      }

      .msg-row.user .msg-label {
        color: var(--accent-dim);
      }

      .msg-text {
        font-size: 13.5px;
        line-height: 1.75;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: var(--accent);
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .thinking {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
        padding: 8px 14px;
      }

      .thinking-dots {
        display: flex;
        gap: 4px;
      }

      .thinking-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        animation: thinking 1.2s ease-in-out infinite;
      }

      .thinking-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .thinking-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes thinking {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        30% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      .input-area {
        position: relative;
        z-index: 10;
        border-top: 1px solid var(--border);
        background: rgba(10, 10, 15, 0.95);
        backdrop-filter: blur(12px);
        padding: 16px 20px 20px;
      }

      .input-wrapper {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent-dim);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      #user-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 13.5px;
        line-height: 1.6;
        resize: none;
        min-height: 24px;
        max-height: 160px;
        overflow-y: auto;
        padding: 2px 0;
      }

      #user-input::placeholder {
        color: var(--text-muted);
      }
      #user-input::-webkit-scrollbar {
        width: 3px;
      }
      #user-input::-webkit-scrollbar-thumb {
        background: var(--border);
      }

      .input-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      #clear-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: all 0.15s;
      }

      #clear-btn:hover {
        border-color: var(--red);
        color: var(--red);
      }

      #send-btn {
        background: var(--accent);
        border: none;
        color: white;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 7px 16px;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 0.06em;
        transition: all 0.15s;
        box-shadow: 0 0 12px var(--accent-glow);
      }

      #send-btn:hover:not(:disabled) {
        background: #9380ff;
        box-shadow: 0 0 20px rgba(124, 106, 247, 0.4);
        transform: translateY(-1px);
      }

      #send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .hint {
        max-width: 760px;
        margin: 8px auto 0;
        font-size: 10px;
        color: var(--text-muted);
        text-align: center;
        letter-spacing: 0.04em;
      }

      .error-toast {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--red);
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 12px;
        margin: 6px 14px;
        animation: fadeIn 0.2s ease;
      }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <h3>Your documents</h3>
      <div class="dropzone" id="dropzone">
        ⬆ Drop PDF / TXT / MD here<br />or click to browse
        <input type="file" id="file-input" accept=".pdf,.txt,.md,.markdown" />
      </div>
      <div class="upload-status" id="upload-status"></div>
      <div id="doc-list"></div>
    </aside>

    <div id="main">
      <header>
        <div class="logo">
          <div class="logo-icon">AI</div>
          <div class="logo-text">Ollama<span>Chat</span></div>
        </div>
        <div class="header-right">
          <div class="model-tag">llama3.2:latest</div>
          <div class="status">
            <div class="status-dot"></div>
            local
          </div>
          <div class="user-chip"><span class="dot">●</span> {{ username }}</div>
          <button id="logout-btn">LOG OUT</button>
        </div>
      </header>

      <div id="chat-container">
        <div id="messages">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">⬡</div>
            <h2>Ready to chat</h2>
            <p>
              Running locally via Ollama ·
              <code style="color: var(--accent)">llama3.2:latest</code> · Upload
              a document on the left to ask questions about it
            </p>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            placeholder="Type a message..."
            rows="1"
          ></textarea>
          <div class="input-actions">
            <button id="clear-btn">CLR</button>
            <button id="send-btn">SEND ↑</button>
          </div>
        </div>
        <p class="hint">Enter ↵ to send · Shift+Enter for newline</p>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const clearBtn = document.getElementById("clear-btn");
      const emptyState = document.getElementById("empty-state");
      const logoutBtn = document.getElementById("logout-btn");
      let isStreaming = false;

      // ---------- Auth ----------
      logoutBtn.addEventListener("click", async () => {
        await fetch("/auth/logout", { method: "POST" });
        window.location.href = "/login";
      });

      // If the session cookie has expired mid-use, bounce to /login instead of
      // silently failing every request.
      async function authFetch(url, options = {}) {
        const res = await fetch(url, options);
        if (res.status === 401) {
          window.location.href = "/login";
          throw new Error("Not authenticated");
        }
        return res;
      }

      // ---------- Chat (unchanged behaviour, now via authFetch) ----------
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", sendMessage);
      clearBtn.addEventListener("click", clearChat);

      function hideEmpty() {
        if (emptyState) emptyState.style.display = "none";
      }

      function appendMessage(role, text) {
        hideEmpty();
        const row = document.createElement("div");
        row.className = `msg-row ${role}`;
        row.innerHTML = `
      <div class="avatar ${role}">${role === "user" ? "U" : "AI"}</div>
      <div class="msg-content">
        <div class="msg-label">${role === "user" ? "you" : "assistant"}</div>
        <div class="msg-text"></div>
      </div>`;
        messagesEl.appendChild(row);
        if (text) row.querySelector(".msg-text").textContent = text;
        scrollBottom();
        return row.querySelector(".msg-text");
      }

      function appendThinking() {
        hideEmpty();
        const el = document.createElement("div");
        el.className = "thinking";
        el.id = "thinking";
        el.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div><span>thinking</span>`;
        messagesEl.appendChild(el);
        scrollBottom();
        return el;
      }

      function scrollBottom() {
        const c = document.getElementById("chat-container");
        c.scrollTop = c.scrollHeight;
      }

      async function sendMessage() {
        const msg = inputEl.value.trim();
        if (!msg || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;
        inputEl.value = "";
        inputEl.style.height = "auto";

        appendMessage("user", msg);
        const thinking = appendThinking();

        try {
          const res = await authFetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg }),
          });

          thinking.remove();

          let botTextEl = null;
          let cursor = null;

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const raw = line.slice(5).trim();

              try {
                const data = JSON.parse(raw);

                if (data.token) {
                  if (!botTextEl) {
                    botTextEl = appendMessage("bot", "");
                    cursor = document.createElement("span");
                    cursor.className = "cursor";
                    botTextEl.appendChild(cursor);
                  }
                  cursor.insertAdjacentText("beforebegin", data.token);
                  scrollBottom();
                }

                if (data.done && cursor) {
                  cursor.remove();
                }

                if (data.error) {
                  if (cursor) cursor.remove();
                  const toast = document.createElement("div");
                  toast.className = "error-toast";
                  toast.textContent = "⚠ " + data.error;
                  messagesEl.appendChild(toast);
                }
              } catch {
                /* malformed SSE line — skip */
              }
            }
          }

          if (cursor) cursor.remove();
        } catch (err) {
          thinking.remove();
          if (err.message !== "Not authenticated") {
            const toast = document.createElement("div");
            toast.className = "error-toast";
            toast.textContent = "⚠ Could not reach the server: " + err.message;
            messagesEl.appendChild(toast);
          }
        }

        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
        scrollBottom();
      }

      async function clearChat() {
        await authFetch("/clear", { method: "POST" });
        messagesEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.id = "empty-state";
        empty.innerHTML = `
      <div class="empty-icon">⬡</div>
      <h2>Conversation cleared</h2>
      <p>Start a new conversation below.</p>`;
        messagesEl.appendChild(empty);
        inputEl.focus();
      }

      // ---------- Document upload / RAG panel ----------
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");
      const docList = document.getElementById("doc-list");
      const uploadStatus = document.getElementById("upload-status");

      dropzone.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        if (fileInput.files.length) uploadFile(fileInput.files[0]);
      });

      ["dragover", "dragleave", "drop"].forEach((evt) => {
        dropzone.addEventListener(evt, (e) => {
          e.preventDefault();
          dropzone.classList.toggle("dragover", evt === "dragover");
        });
      });
      dropzone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files[0];
        if (file) uploadFile(file);
      });

      async function uploadFile(file) {
        const allowed = [".pdf", ".txt", ".md", ".markdown"];
        const ext = "." + file.name.split(".").pop().toLowerCase();
        if (!allowed.includes(ext)) {
          uploadStatus.textContent = "Unsupported file type: " + ext;
          uploadStatus.style.color = "var(--red)";
          return;
        }

        uploadStatus.textContent = "Uploading " + file.name + "…";
        uploadStatus.style.color = "var(--text-dim)";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const res = await authFetch("/documents/upload", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            uploadStatus.textContent = "⚠ " + (data.error || "Upload failed");
            uploadStatus.style.color = "var(--red)";
            return;
          }
          uploadStatus.textContent = `✓ Indexed ${data.chunks} chunks from ${data.filename}`;
          uploadStatus.style.color = "var(--green)";
          fileInput.value = "";
          loadDocuments();
        } catch (err) {
          if (err.message !== "Not authenticated") {
            uploadStatus.textContent = "⚠ " + err.message;
            uploadStatus.style.color = "var(--red)";
          }
        }
      }

      async function loadDocuments() {
        try {
          const res = await authFetch("/documents");
          const data = await res.json();
          renderDocuments(data.documents || []);
        } catch (err) {
          // silently ignore — sidebar just stays empty
        }
      }

      function renderDocuments(docs) {
        docList.innerHTML = "";
        if (!docs.length) {
          docList.innerHTML = '<div class="doc-empty">No documents yet</div>';
          return;
        }
        for (const doc of docs) {
          const item = document.createElement("div");
          item.className = "doc-item";
          item.innerHTML = `
        <div>
          <div class="doc-name">${doc.filename}</div>
          <div class="doc-meta">${doc.chunk_count} chunks</div>
        </div>
        <button class="doc-remove" title="Remove">✕</button>`;
          item
            .querySelector(".doc-remove")
            .addEventListener("click", () => removeDocument(doc.filename));
          docList.appendChild(item);
        }
      }

      async function removeDocument(filename) {
        try {
          await authFetch("/documents/" + encodeURIComponent(filename), {
            method: "DELETE",
          });
          loadDocuments();
        } catch (err) {
          /* ignore */
        }
      }

      // Initial load
      loadDocuments();
    </script>
  </body>
</html>
